{% extends 'billing/base.html' %}
{% block title %}Contraseña Restablecida{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow border-0" style="border-radius: 12px;">
      <div class="card-header bg-dark text-white text-center py-3" style="border-top-left-radius: 12px; border-top-right-radius: 12px;">
        <h4 class="mb-0"><i class="bi bi-check-circle-fill me-2"></i>Contraseña Cambiada</h4>
      </div>
      <div class="card-body p-4 text-center">
        <div class="mb-4">
          <i class="bi bi-shield-check text-success" style="font-size: 3rem;"></i>
        </div>
        <p class="text-muted">
          ¡Su contraseña ha sido restablecida con éxito!
        </p>
        <p class="text-muted small">
          Ahora puede proceder a iniciar sesión utilizando su nueva contraseña.
        </p>
        <div class="mt-4">
          <a href="{% url 'security:login' %}" class="btn btn-primary px-4 fw-bold shadow-sm" style="border-radius: 8px;">
            Iniciar Sesión
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
