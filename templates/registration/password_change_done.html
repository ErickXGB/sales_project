{% extends 'billing/base.html' %}
{% block title %}Contraseña Cambiada{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow border-0 text-center" style="border-radius: 12px;">
      <div class="card-body p-5">
        <div class="text-success mb-4" style="font-size: 4rem;">
          <i class="bi bi-check-circle-fill"></i>
        </div>
        <h3 class="fw-bold text-dark mb-3">¡Contraseña Cambiada Exitosamente!</h3>
        <p class="text-secondary mb-4">Su contraseña ha sido modificada con éxito. Ya puede seguir navegando en el sistema.</p>
        <a href="{% url 'billing:home' %}" class="btn btn-primary px-5 py-2 fw-semibold" style="background: linear-gradient(135deg, #2f5597 0%, #1f4e78 100%); border: none; border-radius: 8px;">
          Volver al Inicio
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
